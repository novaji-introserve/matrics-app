[database]
host = localhost
port = 5432
user = postgres
password = rrrrrrrrrrr
dbname = test3
# ===================================================== #
# RISK ANALYSIS PROCESSOR ADDITIONAL DB CONFIGURATION   #
# ===================================================== #
ssl_mode = disable          # was: require — localhost doesn't need SSL
pool_min = 5                # was: 32 — lowered for local dev
pool_max = 20               # was: 200 — lowered for local dev
pool_max_idle_time = 300
pool_max_lifetime = 3600
connect_timeout = 10
query_timeout = 60


# ===================================================== #
# BEGIN: RISK ANALYSIS PROCESSOR CONFIGURATION          #
# ===================================================== #

[risk_analysis]
# ============================================ #
# PROCESSING CONFIGURATION                     #
# ============================================ #
batch_size = 50             # was: 500 — smaller batches for local testing
worker_count = 4            # was: 128 — lowered for local dev
workers_per_batch = 0       # 0 = auto (uses runtime.NumCPU()); set explicitly for prod e.g. 64
chunk_size = 1000           # was: 50000 — lowered for local dev

# File-based caching (local paths)
cache_directory = ./data
customer_id_cache_file = ./data/customer_ids.cache
processed_customers_file = ./data/processed_customers.txt
risk_functions_cache_file = ./data/risk_functions.json
risk_metadata_cache_file = ./data/risk_calculator_metadata.json

# Production paths (server)
# cache_directory = /data/odoo/custom_addons/icomply_odoo/risk_analysis/cache
# customer_id_cache_file = /data/odoo/custom_addons/icomply_odoo/risk_analysis/cache/customer_ids.cache
# processed_customers_file = /data/odoo/custom_addons/icomply_odoo/risk_analysis/cache/processed_customers.txt
# risk_functions_cache_file = /data/odoo/custom_addons/icomply_odoo/risk_analysis/cache/risk_functions.json
# risk_metadata_cache_file = /data/odoo/custom_addons/icomply_odoo/risk_analysis/cache/risk_calculator_metadata.json

# Performance tuning
enable_bulk_operations = true
bulk_insert_batch_size = 1000
progress_checkpoint_interval = 10000

# ============================================ #
# LOGGING CONFIGURATION                        #
# ============================================ #
log_level = INFO
log_format = text
log_output = file
log_file = ./logs/risk-processor.log
# log_file = /data/odoo/custom_addons/icomply_odoo/risk_analysis/log/risk-processor.log
log_max_size = 100
log_max_backups = 5
log_max_age = 30

# ============================================ #
# RETRY AND RESILIENCE                         #
# ============================================ #
max_retries = 3
retry_initial_interval = 1
retry_max_interval = 10
retry_multiplier = 2

# ============================================ #
# OPERATIONAL SETTINGS                         #
# ============================================ #
dry_run = false
resume_from_checkpoint = false
checkpoint_file = ./data/risk-processor-checkpoint.json
# checkpoint_file = /data/odoo/custom_addons/icomply_odoo/risk_analysis/cache/risk-processor-checkpoint.json

# Customer filtering (optional)
# customer_ids = 1,2,3,4,5
# customer_id_range_start = 1000
# customer_id_range_end = 2000

# ===================================================== #
# API CONFIGURATION                                     #
# ===================================================== #

[api]
port = 4567
host = 0.0.0.0

[api.logging]
log_level = INFO
log_format = json
log_output = file
log_file = ./logs/risk-api-server.log
log_max_size = 100
log_max_backups = 5
log_max_age = 30


# ===================================================== #
# REDIS CACHE CONFIGURATION (OPTIONAL)                  #
# ===================================================== #

[redis]
enabled = true
host = localhost
port = 6379
password =
db = 0
pool_size = 10

# NOTE: When Redis is enabled, all cache data will be stored in Redis
# using the database name (dbname) as a prefix for all keys.
# This allows multiple databases to share the same Redis instance
# without key collisions.

# ===================================================== #
# END: RISK ANALYSIS PROCESSOR CONFIGURATION            #
# ===================================================== #
