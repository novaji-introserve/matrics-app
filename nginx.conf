upstream odoo {
    server 127.0.0.1:10016;
}

upstream odoo_longpolling {
    server 127.0.0.1:20016;
}

upstream fastapi {
    server 127.0.0.1:8001;
}

upstream seatunnel {
    server 127.0.0.1:5801;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name example.com;

    ssl_certificate     /etc/ssl/certs/example.com.crt;
    ssl_certificate_key /etc/ssl/private/example.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    access_log /var/log/nginx/matrics_access.log;
    error_log  /var/log/nginx/matrics_error.log;

    proxy_read_timeout  720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout  720s;

    proxy_set_header X-Forwarded-Host   $host;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Real-IP          $remote_addr;

    client_max_body_size 100m;

    # ── Odoo websocket / longpolling ─────────────────────────────────────────
    location /websocket {
        proxy_pass http://odoo_longpolling;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    location /longpolling {
        proxy_pass http://odoo_longpolling;
    }

    # ── Odoo static assets (served directly for performance) ─────────────────
    location ~* /web/static/ {
        proxy_cache_valid 200 90m;
        proxy_buffering   on;
        proxy_pass        http://odoo;
        expires           864000;
        add_header        Cache-Control "public, immutable";
    }

    # ── Odoo ─────────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://odoo;
        proxy_redirect off;
    }

    # ── FastAPI ───────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://fastapi/;
        proxy_redirect off;
    }

    # FastAPI WebSocket support
    location /api/ws {
        proxy_pass http://fastapi/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    # ── SeaTunnel REST API ────────────────────────────────────────────────────
    location /seatunnel/ {
        proxy_pass http://seatunnel/;
        proxy_redirect off;
    }

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip            on;
    gzip_min_length 1100;
    gzip_buffers    4 32k;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        image/svg+xml;
}
