map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream odoo {
    server 127.0.0.1:10016;
}

upstream odoo_longpolling {
    server 127.0.0.1:20016;
}

upstream fastapi {
    server 127.0.0.1:8001;
}

upstream seatunnel {
    server 127.0.0.1:5801;
}

server {
    listen 80;
    listen [::]:80;
    server_name dev1.novajii.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dev1.novajii.com;

    ssl_certificate /etc/ssl/wildcard_novajii/_novajii_com.crt;
    ssl_certificate_key /etc/ssl/wildcard_novajii/private.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    access_log /var/log/nginx/matrics_access.log;
    error_log  /var/log/nginx/matrics_error.log;

    proxy_read_timeout    720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout    720s;

    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP         $remote_addr;

    client_max_body_size 100m;

    location /websocket {
        proxy_pass http://odoo_longpolling/websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /longpolling/ {
        proxy_pass http://odoo_longpolling/longpolling/;
    }

    location /csv_import/ws {
        proxy_pass http://0.0.0.0:8073/websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location ~* /web/static/ {
        proxy_cache_valid 200 90m;
        proxy_buffering   on;
        proxy_pass        http://odoo;
        expires           864000;
        add_header        Cache-Control "public, immutable";
    }

    location /api/ws {
        proxy_pass http://fastapi/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /api/ {
        proxy_pass   http://fastapi/;
        proxy_redirect off;
    }

    location /seatunnel/ {
        proxy_pass   http://seatunnel/;
        proxy_redirect off;
    }

    location / {
        proxy_pass http://odoo;
    }

    gzip            on;
    gzip_min_length 1100;
    gzip_buffers    4 32k;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        image/svg+xml;
}
