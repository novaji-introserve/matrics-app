hazelcast:
  cluster-name: seatunnel
  network:
    rest-api:
      enabled: true
      endpoint-groups:
        CLUSTER_READ:
          enabled: true
        CLUSTER_WRITE:
          enabled: true
        DATA:
          enabled: true
        WAN:
          enabled: false
        HOT_RESTART:
          enabled: false
        CP:
          enabled: false
    port:
      auto-increment: false
      port: 5801
    join:
      tcp-ip:
        enabled: true
        member-list:
          - seatunnel
  properties:
    hazelcast.invocation.max.retry.count: 20
    hazelcast.tcp.join.port.try.count: 30
    hazelcast.logging.type: log4j2
    hazelcast.operation.generic.thread.count: 50
